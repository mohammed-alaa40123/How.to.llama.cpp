<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>How.to.llama.cpp — Interactive inference flow</title>
<style>
:root{color-scheme:dark;font-family:system-ui,sans-serif}body{margin:0;background:#0b1020;color:#eef2ff}header{padding:20px 24px;border-bottom:1px solid #29324d}main{display:grid;grid-template-columns:minmax(0,2fr) minmax(260px,1fr);gap:18px;padding:20px}.flow{display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}.node{border:1px solid #405071;background:#151d33;color:inherit;border-radius:12px;padding:12px 14px;cursor:pointer;min-width:150px;text-align:left}.node:hover,.node.active{border-color:#7dd3fc;background:#1d3150}.arrow{align-self:center;color:#7f8cab}.panel{border:1px solid #29324d;border-radius:14px;padding:18px;background:#11182b;min-height:300px}.panel h2{margin-top:0}.meta{font-size:.9rem;color:#b8c2df}code{color:#a7f3d0}a{color:#7dd3fc}@media(max-width:800px){main{grid-template-columns:1fr}.arrow{display:none}}
</style>
</head>
<body>
<header><strong>How.to.llama.cpp</strong> — click a stage to inspect the implementation path.</header>
<main>
<section class="flow" id="flow" aria-label="Inference stages"></section>
<aside class="panel"><h2 id="title">Select a stage</h2><p id="description"></p><p class="meta"><strong>Representative symbols</strong></p><div id="symbols"></div><p class="meta"><strong>Source area</strong></p><p id="source"></p><p class="meta"><strong>Next research question</strong></p><p id="question"></p></aside>
</main>
<script>
const rev='e3546c7948e3af463d0b401e6421d5a4c2faf565';
const base=`https://github.com/ggml-org/llama.cpp/blob/${rev}/`;
const stages=[
['Backends','Discover registered CPU, GPU and accelerator implementations.',['ggml_backend_load_all'],'examples/simple/simple.cpp','How are plugins registered on each platform?'],
['Model load','Parse GGUF metadata, choose an architecture and load tensors.',['llama_model_load_from_file','llama_model_loader'],'src/llama.cpp','How do mmap and explicit reads differ by configuration?'],
['Context','Create the active runtime, memory modules and scheduler.',['llama_init_from_model','llama_context::llama_context'],'src/llama-context.cpp','What exactly is owned by llama_context?'],
['Batch','Tokenize input and prepare prompt or one-token batches.',['llama_tokenize','llama_batch_get_one'],'examples/simple/simple.cpp','How do multiple sequences change batching?'],
['Graph','Build or reuse the architecture-specific GGML graph.',['process_ubatch','llama_model::build_graph'],'src/llama-context.cpp','What is the exact graph-reuse predicate?'],
['Allocate','Bind graph tensors to reserved backend-compatible buffers.',['ggml_backend_sched_alloc_graph'],'ggml/src/ggml-backend.cpp','How are views and in-place allocations handled?'],
['Schedule','Assign nodes, split by backend and prepare copies/events.',['ggml_backend_sched_split_graph','ggml_backend_sched_compute_splits'],'ggml/src/ggml-backend.cpp','Which transfers are asynchronous at this revision?'],
['Execute','Run CPU thread-pool kernels or accelerator queues.',['ggml_backend_graph_compute_async','ggml_graph_compute'],'ggml/src/ggml-backend.cpp','Where are synchronization boundaries enforced?'],
['Outputs','Expose logits or embeddings to the context and sampler.',['llama_get_logits'],'src/llama-context.cpp','When are device outputs copied to host memory?'],
['Sample + loop','Select the next token and feed it back as a one-token batch.',['llama_sampler_sample','llama_token_to_piece'],'examples/simple/simple.cpp','How do backend samplers alter this path?']
];
const flow=document.getElementById('flow');
stages.forEach((s,i)=>{const b=document.createElement('button');b.className='node';b.textContent=`${i+1}. ${s[0]}`;b.onclick=()=>select(i);flow.appendChild(b);if(i<stages.length-1){const a=document.createElement('span');a.className='arrow';a.textContent='→';flow.appendChild(a)}});
function select(i){document.querySelectorAll('.node').forEach((n,j)=>n.classList.toggle('active',j===i));const s=stages[i];title.textContent=s[0];description.textContent=s[1];symbols.innerHTML=s[2].map(x=>`<div><code>${x}</code></div>`).join('');source.innerHTML=`<a target="_blank" rel="noopener" href="${base+s[3]}">${s[3]}</a><br><code>${rev.slice(0,12)}</code>`;question.textContent=s[4]}
select(0);
</script>
</body></html>
