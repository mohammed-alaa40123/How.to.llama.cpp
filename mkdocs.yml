site_name: How.to.llama.cpp
site_description: A source-guided map of llama.cpp and GGML internals
site_url: https://mohammed-alaa40123.github.io/How.to.llama.cpp/
repo_url: https://github.com/mohammed-alaa40123/How.to.llama.cpp
repo_name: mohammed-alaa40123/How.to.llama.cpp
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Foundations:
      - What GGML is: ggml/what-is-ggml.md
  - Architecture:
      - Repository map: architecture/repository-map.md
  - Inference lifecycle:
      - Brief end to end: lifecycle/end-to-end.md
      - Decode and graph reuse: lifecycle/decode-graph-reuse.md
      - Backend scheduler execution: lifecycle/backend-scheduler-execution.md
      - Generic copy fallback: lifecycle/generic-copy-fallback.md
      - CPU and CUDA backend semantics: lifecycle/cpu-cuda-backend-semantics.md
      - CUDA asynchronous copies: lifecycle/cuda-async-copy.md
      - Metal backend semantics: lifecycle/metal-backend-semantics.md
  - Interactive:
      - Inference workflow: interactive/inference-workflow.md
  - Reference:
      - Source index: reference/source-index.md
      - Research ledger: reference/research-ledger.md
      - Project state: reference/project-state.md
      - Research log: reference/research-log.md
  - Contributing: contributing.md