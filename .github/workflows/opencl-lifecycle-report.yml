name: Generate pinned OpenCL lifecycle report

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/extract_opencl_lifecycle_calls.py"
      - "tests/test_extract_opencl_lifecycle_calls.py"
      - ".github/workflows/opencl-lifecycle-report.yml"

permissions:
  contents: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out documentation repository
        uses: actions/checkout@v4

      - name: Fetch pinned llama.cpp OpenCL source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/upstream
          git -C build/upstream init
          git -C build/upstream remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C build/upstream fetch --depth=1 origin e3546c7948e3af463d0b401e6421d5a4c2faf565
          git -C build/upstream checkout --detach FETCH_HEAD
          test -s build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          test "$(git -C build/upstream rev-parse HEAD)" = "e3546c7948e3af463d0b401e6421d5a4c2faf565"

      - name: Generate lifecycle report with bounded context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/reports
          source_path=build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          report_name=opencl-lifecycle-pinned-e3546c7.json
          source_name=ggml-opencl-pinned-e3546c7.cpp
          manifest_name=opencl-lifecycle-pinned-e3546c7.sha256
          report_path=build/reports/$report_name
          preserved_source=build/reports/$source_name
          manifest_path=build/reports/$manifest_name

          python3 scripts/extract_opencl_lifecycle_calls.py \
            "$source_path" \
            --context-lines 3 \
            --out "$report_path"
          cp "$source_path" "$preserved_source"

          # Record artifact-root basenames so verification works immediately after
          # extracting the uploaded ZIP into one directory.
          (
            cd build/reports
            sha256sum "$report_name" "$source_name" > "$manifest_name"
            sha256sum -c "$manifest_name"
          )

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = Path("build/reports/opencl-lifecycle-pinned-e3546c7.json")
          source = Path("build/reports/ggml-opencl-pinned-e3546c7.cpp")
          manifest = Path("build/reports/opencl-lifecycle-pinned-e3546c7.sha256")
          expected_names = {report.name, source.name}
          data = json.loads(report.read_text(encoding="utf-8"))
          print(json.dumps(data["counts"], indent=2, sort_keys=True))
          if not data["calls"]:
              raise SystemExit("OpenCL lifecycle report unexpectedly contains no calls")
          if source.stat().st_size < 100_000:
              raise SystemExit("Pinned OpenCL source is unexpectedly small")

          manifest_lines = manifest.read_text(encoding="utf-8").splitlines()
          if len(manifest_lines) != 2:
              raise SystemExit("Checksum manifest must contain report and source entries")
          manifest_names = {line.split(maxsplit=1)[1].lstrip("*") for line in manifest_lines}
          if manifest_names != expected_names:
              raise SystemExit(
                  f"Checksum manifest must use artifact-root basenames: {sorted(expected_names)}; "
                  f"got {sorted(manifest_names)}"
              )
          PY

      - name: Upload pinned lifecycle report and source evidence
        uses: actions/upload-artifact@v4
        with:
          name: opencl-lifecycle-pinned-e3546c7
          path: |
            build/reports/opencl-lifecycle-pinned-e3546c7.json
            build/reports/ggml-opencl-pinned-e3546c7.cpp
            build/reports/opencl-lifecycle-pinned-e3546c7.sha256
          if-no-files-found: error
          retention-days: 30
