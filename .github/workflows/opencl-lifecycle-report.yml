name: Generate pinned OpenCL lifecycle report

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/extract_opencl_lifecycle_calls.py"
      - "scripts/annotate_opencl_wait_followups.py"
      - "scripts/classify_opencl_set_tensor_waits.py"
      - "scripts/apply_opencl_event_release_fix.py"
      - "tests/test_extract_opencl_lifecycle_calls.py"
      - "tests/test_annotate_opencl_wait_followups.py"
      - "tests/test_classify_opencl_set_tensor_waits.py"
      - "tests/test_apply_opencl_event_release_fix.py"
      - ".github/workflows/opencl-lifecycle-report.yml"

permissions:
  contents: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out documentation repository
        uses: actions/checkout@v4

      - name: Fetch pinned llama.cpp OpenCL source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/upstream
          git -C build/upstream init
          git -C build/upstream remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C build/upstream fetch --depth=1 origin e3546c7948e3af463d0b401e6421d5a4c2faf565
          git -C build/upstream checkout --detach FETCH_HEAD
          test -s build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          test "$(git -C build/upstream rev-parse HEAD)" = "e3546c7948e3af463d0b401e6421d5a4c2faf565"

      - name: Generate lifecycle report with bounded context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/reports
          source_path=build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          report_name=opencl-lifecycle-pinned-e3546c7.json
          source_name=ggml-opencl-pinned-e3546c7.cpp
          manifest_name=opencl-lifecycle-pinned-e3546c7.sha256
          report_path=build/reports/$report_name
          preserved_source=build/reports/$source_name
          manifest_path=build/reports/$manifest_name

          python3 scripts/extract_opencl_lifecycle_calls.py \
            "$source_path" \
            --context-lines 3 \
            --out "$report_path"
          python3 scripts/annotate_opencl_wait_followups.py "$source_path" "$report_path"
          cp "$source_path" "$preserved_source"

          # Record artifact-root basenames so verification works immediately after
          # extracting the uploaded ZIP into one directory.
          (
            cd build/reports
            sha256sum "$report_name" "$source_name" > "$manifest_name"
            sha256sum -c "$manifest_name"
          )

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = Path("build/reports/opencl-lifecycle-pinned-e3546c7.json")
          source = Path("build/reports/ggml-opencl-pinned-e3546c7.cpp")
          manifest = Path("build/reports/opencl-lifecycle-pinned-e3546c7.sha256")
          expected_names = {report.name, source.name}
          data = json.loads(report.read_text(encoding="utf-8"))
          print(json.dumps(data["counts"], indent=2, sort_keys=True))
          print(json.dumps(data["simple_waited_event_counts"], indent=2, sort_keys=True))
          print(json.dumps(data["simple_waited_event_followup_counts"], indent=2, sort_keys=True))
          if not data["calls"]:
              raise SystemExit("OpenCL lifecycle report unexpectedly contains no calls")

          # This bounded diagnostic intentionally accepts only &identifier. The
          # separate profiling wait uses &info.evt and is correctly outside this
          # simple-local inventory, leaving 50 records rather than all 51 waits.
          expected_wait_counts = {
              "released_in_scope": 4,
              "unmatched_in_scope": 46,
          }
          if data["simple_waited_event_counts"] != expected_wait_counts:
              raise SystemExit(
                  "Pinned simple identifier waited-event ownership counts changed: "
                  f"expected {expected_wait_counts}, got {data['simple_waited_event_counts']}"
              )
          if len(data["simple_waited_events"]) != 50:
              raise SystemExit("Pinned source must contain exactly 50 simple &identifier waits")

          # Synchronization hints are intentionally independent of ownership.
          # They guard the reviewed subset of unmatched waits whose next statement
          # is a same-queue CL_TRUE readback.
          expected_followup_counts = {
              "unmatched_followed_by_same_queue_blocking_read": 22,
              "other_unmatched": 24,
          }
          if data["simple_waited_event_followup_counts"] != expected_followup_counts:
              raise SystemExit(
                  "Pinned blocking-read follow-up counts changed: "
                  f"expected {expected_followup_counts}, "
                  f"got {data['simple_waited_event_followup_counts']}"
              )

          if source.stat().st_size < 100_000:
              raise SystemExit("Pinned OpenCL source is unexpectedly small")

          manifest_lines = manifest.read_text(encoding="utf-8").splitlines()
          if len(manifest_lines) != 2:
              raise SystemExit("Checksum manifest must contain report and source entries")
          manifest_names = {line.split(maxsplit=1)[1].lstrip("*") for line in manifest_lines}
          if manifest_names != expected_names:
              raise SystemExit(
                  f"Checksum manifest must use artifact-root basenames: {sorted(expected_names)}; "
                  f"got {sorted(manifest_names)}"
              )
          PY

      - name: Classify remaining set_tensor waits
        shell: bash
        run: |
          set -euo pipefail
          source_path=build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          report_path=build/reports/opencl-lifecycle-pinned-e3546c7.json
          groups_path=build/reports/opencl-set-tensor-wait-groups-e3546c7.json

          python3 scripts/classify_opencl_set_tensor_waits.py \
            "$source_path" \
            "$report_path" \
            --output "$groups_path"

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("build/reports/opencl-set-tensor-wait-groups-e3546c7.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          expected_counts = {
              "nested_scope_exit": 3,
              "temporary_upload_buffer_release": 21,
          }
          if data["classified_wait_count"] != 24:
              raise SystemExit(
                  "Pinned set_tensor wait classifier must produce exactly 24 records: "
                  f"got {data['classified_wait_count']}"
              )
          if data["counts"] != expected_counts:
              raise SystemExit(
                  "Pinned set_tensor wait groups changed: "
                  f"expected {expected_counts}, got {data['counts']}"
              )
          functions = {record["enclosing_function"] for record in data["records"]}
          expected_function = {"ggml_backend_opencl_buffer_set_tensor"}
          if functions != expected_function:
              raise SystemExit(
                  "All 24 pinned records must remain in ggml_backend_opencl_buffer_set_tensor: "
                  f"got {sorted(functions)}"
              )
          if any(record["classification"] == "other" for record in data["records"]):
              raise SystemExit("Pinned set_tensor classifier produced an unresolved 'other' record")
          print(json.dumps(data["counts"], indent=2, sort_keys=True))
          PY

      - name: Generate and validate release-only event fix
        shell: bash
        run: |
          set -euo pipefail
          source_path=build/upstream/ggml/src/ggml-opencl/ggml-opencl.cpp
          report_path=build/reports/opencl-lifecycle-pinned-e3546c7.json
          fixed_source=build/reports/ggml-opencl-event-release-fixed-e3546c7.cpp
          fixed_report=build/reports/opencl-lifecycle-event-release-fixed-e3546c7.json
          patch_path=build/reports/opencl-event-release-e3546c7.patch

          python3 scripts/apply_opencl_event_release_fix.py \
            "$source_path" \
            "$report_path" \
            --out "$fixed_source" \
            --patch-out "$patch_path" \
            --expected-fixes 46

          python3 scripts/extract_opencl_lifecycle_calls.py \
            "$fixed_source" \
            --context-lines 3 \
            --out "$fixed_report"

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("build/reports/opencl-lifecycle-event-release-fixed-e3546c7.json")
              .read_text(encoding="utf-8")
          )
          expected = {"released_in_scope": 50, "unmatched_in_scope": 0}
          if report["simple_waited_event_counts"] != expected:
              raise SystemExit(
                  "release-only patch did not close all simple event ownership gaps: "
                  f"expected {expected}, got {report['simple_waited_event_counts']}"
              )
          if report["counts"]["clWaitForEvents"] != 51:
              raise SystemExit("release-only patch must preserve all 51 waits")
          if report["counts"]["clReleaseEvent"] != 52:
              raise SystemExit("release-only patch must add exactly 46 event releases")
          if not Path("build/reports/opencl-event-release-e3546c7.patch").stat().st_size:
              raise SystemExit("generated release-only patch is empty")
          print(json.dumps(report["simple_waited_event_counts"], indent=2, sort_keys=True))
          PY

      - name: Upload pinned lifecycle report and source evidence
        uses: actions/upload-artifact@v4
        with:
          name: opencl-lifecycle-pinned-e3546c7
          path: |
            build/reports/opencl-lifecycle-pinned-e3546c7.json
            build/reports/ggml-opencl-pinned-e3546c7.cpp
            build/reports/opencl-lifecycle-pinned-e3546c7.sha256
            build/reports/opencl-set-tensor-wait-groups-e3546c7.json
            build/reports/opencl-event-release-e3546c7.patch
            build/reports/opencl-lifecycle-event-release-fixed-e3546c7.json
          if-no-files-found: error
          retention-days: 30