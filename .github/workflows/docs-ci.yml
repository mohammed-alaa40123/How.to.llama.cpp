name: Documentation CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out documentation repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read README and current project context
        env:
          RUN_CONTEXT_OUT: ${{ runner.temp }}/how-to-llama-ci-context.md
        run: ./scripts/start_scheduled_run.sh documentation-ci

      - name: Validate durable project context
        run: python3 scripts/validate_project_context.py

      - name: Validate interactive links
        run: python3 scripts/validate_interactive_links.py

      - name: Test source indexing
        run: python3 -m unittest -v tests.test_index_upstream

      - name: Test source-index initializer boundaries
        run: python3 -m unittest -v tests.test_index_upstream_initializer_boundaries

      - name: Test source-index unsupported syntax
        run: python3 -m unittest -v tests.test_index_upstream_unsupported_syntax

      - name: Test source-index function try blocks
        run: python3 -m unittest -v tests.test_index_upstream_function_try_blocks

      - name: Test interactive-link validation
        run: python3 -m unittest -v tests.test_validate_interactive_links

      - name: Test OpenCL lifecycle extraction
        run: python3 -m unittest -v tests.test_extract_opencl_lifecycle_calls

      - name: Guard unit-test discovery
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Compile Python sources
        run: python3 -m py_compile scripts/*.py tests/*.py

      - name: Validate required interactive assets
        run: |
          test -s docs/assets/interactive/inference-flow.html
          test -s docs/assets/interactive/llama-foundations-explorer.html

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site strictly
        run: mkdocs build --strict

      - name: Validate built-site accessibility structure
        run: python3 scripts/validate_built_site_accessibility.py site

      - name: Install browser smoke dependency
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Validate representative routes in Chromium
        env:
          BASE_URL: http://127.0.0.1:8000
          BROWSER_SMOKE_ARTIFACT_DIR: browser-smoke-artifacts
        run: |
          python3 -m http.server 8000 --directory site > browser-smoke-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8000/ >/dev/null
          node scripts/validate_browser_smoke.mjs

      - name: Upload browser smoke failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-failure-${{ github.sha }}
          path: |
            browser-smoke-artifacts/
            browser-smoke-server.log
          if-no-files-found: ignore
          retention-days: 14
