name: Documentation CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out documentation repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Read README and current project context
        env:
          RUN_CONTEXT_OUT: ${{ runner.temp }}/how-to-llama-ci-context.md
        run: ./scripts/start_scheduled_run.sh documentation-ci

      - name: Validate durable project context
        run: python3 scripts/validate_project_context.py

      - name: Validate interactive links
        run: python3 scripts/validate_interactive_links.py

      - name: Run Python unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Compile Python sources
        run: python3 -m py_compile scripts/*.py tests/*.py

      - name: Validate required interactive assets
        run: |
          test -s docs/assets/interactive/inference-flow.html
          test -s docs/assets/interactive/llama-foundations-explorer.html

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site strictly
        run: mkdocs build --strict
